<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分词引擎大比拼</title>
    <style>
        :root {
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-success: #16a34a;
            --color-teal: #0891b2;
            --color-neutral-50: #f9fafb;
            --color-neutral-100: #f3f4f6;
            --color-neutral-200: #e5e7eb;
            --color-neutral-300: #d1d5db;
            --color-neutral-500: #6b7280;
            --color-neutral-700: #374151;
            --color-neutral-900: #111827;
            --text-sm: 14px;
            --text-base: 16px;
            --text-lg: 20px;
            --text-xl: 24px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--color-neutral-100);
            color: var(--color-neutral-900);
            padding: var(--space-8) var(--space-4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: #fff;
            padding: var(--space-8);
            border-radius: var(--radius);
            border: 1px solid var(--color-neutral-200);
        }

        h2 {
            font-size: var(--text-xl);
            font-weight: 600;
            margin-bottom: var(--space-5);
        }

        .config-bar {
            background: var(--color-neutral-50);
            padding: var(--space-3) var(--space-4);
            border-radius: 6px;
            margin-bottom: var(--space-5);
            border-left: 4px solid var(--color-primary);
            font-size: var(--text-sm);
            color: var(--color-neutral-700);
            line-height: 1.6;
        }

        .config-bar b { color: var(--color-primary); }
        .config-bar code { background: var(--color-neutral-200); padding: 1px 4px; border-radius: 3px; font-size: 13px; }

        .input-group { margin-bottom: var(--space-5); }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: var(--space-2);
            border: 1px solid var(--color-neutral-300);
            border-radius: 6px;
            font-size: var(--text-base);
            resize: none;
        }

        textarea:focus { border-color: var(--color-primary); outline: none; }

        .btn {
            width: 100%;
            padding: var(--space-2) var(--space-5);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: var(--text-base);
            cursor: pointer;
            color: #fff;
            transition: background 0.2s;
        }

        .btn-primary { background: var(--color-primary); }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-primary:disabled { background: var(--color-neutral-300); cursor: not-allowed; }

        .btn + .btn { margin-top: var(--space-2); }

        .comparison-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-5);
            margin-top: var(--space-6);
        }

        .column {
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius);
            padding: var(--space-5);
        }

        .col-title {
            font-weight: 600;
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--text-base);
        }

        .col-title-jieba { color: var(--color-success); }
        .col-title-llm { color: var(--color-teal); }

        .col-count { font-size: var(--text-sm); font-weight: 400; color: var(--color-neutral-500); }

        .token-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            min-height: 120px;
            align-content: flex-start;
        }

        .token {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: var(--text-sm);
            color: #fff;
        }

        .token-jieba { background: var(--color-success); }
        .token-llm { background: var(--color-teal); }

        .token-id {
            display: block;
            font-size: 10px;
            opacity: 0.8;
            margin-top: 2px;
            text-align: center;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: var(--space-2) var(--space-6);
            border-radius: 6px;
            font-size: var(--text-sm);
            font-weight: 600;
            color: #fff;
            z-index: 999;
            display: none;
        }

        .toast-success { background: var(--color-success); }
        .toast-error { background: #dc2626; }

        @media (max-width: 768px) {
            .container { padding: var(--space-5); }
            .comparison-view { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            body { padding: var(--space-4) var(--space-2); }
            .container { padding: var(--space-4); }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
    <h2>分词引擎大比拼（纯本地离线版）</h2>

    <div class="config-bar">
        <b>技术提示</b>：右侧的大模型分词直接在你的浏览器内存中解析 <code>tokenizer.json</code>，不需要 API Key，不消耗网络算力！当前加载的词表：<b>Xenova/qwen1.5-0.5b</b>（通义千问模型的分词器，含 15 万词汇量）。模型文件已预下载到服务器本地，无需访问外网。
    </div>

    <div class="input-group">
        <label>输入测试文本（尝试对比现代文与生僻字：曲曲折折 / 魑魅魍魉）</label>
        <textarea id="inputText">南京市长江大桥正在欢迎你，这里有曲曲折折的荷塘。</textarea>
    </div>

    <button class="btn btn-primary" id="runBtn" onclick="runComparison()" disabled>正在加载本地分词器环境，请稍候...</button>

    <div class="comparison-view">
        <div class="column">
            <div class="col-title col-title-jieba">
                <span>传统分词（基于词典模拟）</span>
                <span class="col-count" id="jieba-count"></span>
            </div>
            <div class="token-list" id="jieba-result"></div>
        </div>
        <div class="column">
            <div class="col-title col-title-llm">
                <span>大模型分词（千问 Tokenizer）</span>
                <span class="col-count" id="llm-count"></span>
            </div>
            <div class="token-list" id="llm-result"></div>
        </div>
    </div>
</div>

<script type="module">
    import { AutoTokenizer, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

    // 配置本地模型加载
    env.allowLocalModels = true;
    env.localModelPath = new URL('./models/', window.location.href).href;

    let tokenizer = null;

    function showToast(msg, type) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast toast-' + (type || 'success');
        t.style.display = 'block';
        setTimeout(function() { t.style.display = 'none'; }, 2500);
    }

    async function initTokenizer() {
        try {
            tokenizer = await AutoTokenizer.from_pretrained('Xenova/qwen1.5-0.5b', { local_files_only: true });
            const btn = document.getElementById('runBtn');
            btn.textContent = '开始双引擎解析';
            btn.disabled = false;
        } catch (error) {
            console.error('分词器加载失败:', error);
            document.getElementById('runBtn').textContent = '加载失败，请刷新页面';
        }
    }

    const MOCK_DICT = ["南京市", "南京", "市长", "长江大桥", "长江", "大桥", "欢迎", "这里", "荷塘", "正在"];

    function simulateJieba(text) {
        let result = [];
        let i = 0;
        while (i < text.length) {
            let matched = false;
            for (let len = 4; len >= 2; len--) {
                let word = text.substr(i, len);
                if (MOCK_DICT.includes(word)) {
                    result.push(word);
                    i += len;
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                result.push(text[i]);
                i++;
            }
        }
        return result;
    }

    window.runComparison = async function() {
        if (!tokenizer) return;
        const text = document.getElementById('inputText').value;
        const jiebaBox = document.getElementById('jieba-result');
        const llmBox = document.getElementById('llm-result');

        // 传统分词
        jiebaBox.innerHTML = '';
        const jWords = simulateJieba(text);
        jWords.forEach(w => {
            const span = document.createElement('span');
            span.className = 'token token-jieba';
            span.textContent = w;
            jiebaBox.appendChild(span);
        });
        document.getElementById('jieba-count').textContent = '共 ' + jWords.length + ' 个词';

        // 大模型分词
        llmBox.innerHTML = '';
        const tokenIds = tokenizer.encode(text);
        tokenIds.forEach(id => {
            const tokenText = tokenizer.decode([id]);
            const span = document.createElement('span');
            span.className = 'token token-llm';
            let displayText = tokenText.replace(' ', '\u2423').replace('\n', '\\n');
            span.innerHTML = displayText + ' <span class="token-id">ID: ' + id + '</span>';
            llmBox.appendChild(span);
        });
        document.getElementById('llm-count').textContent = '共 ' + tokenIds.length + ' 个 Token';
    };

    initTokenizer();
</script>

</body>
</html>
